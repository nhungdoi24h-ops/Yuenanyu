<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Flashcard</title>

<link rel="stylesheet" href="style.css">

<style>

body{

margin:0;
padding:0;
background:#f5f5f5;
font-family:Arial,sans-serif;

}

header{

background:#4CAF50;
color:white;
padding:18px;
text-align:center;

}

header h1{

margin:0;
font-size:28px;

}

header p{

margin-top:8px;
font-size:16px;

}

.container{

max-width:900px;
margin:auto;
padding:20px;

}

.progress{

height:10px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;

}

.progressBar{

height:100%;
width:0%;
background:#4CAF50;
transition:.3s;

}

.card{

background:white;
border-radius:16px;
padding:35px;
box-shadow:0 3px 12px rgba(0,0,0,.12);
text-align:center;
min-height:340px;

display:flex;
flex-direction:column;
justify-content:center;

}

.word{

font-size:34px;
font-weight:bold;
color:#2196F3;

}

.cn{

font-size:42px;
margin-top:18px;

}

.pinyin{

margin-top:10px;
font-size:22px;
color:#888;

}

.example{

margin-top:25px;
padding:15px;
background:#fafafa;
border-left:5px solid #4CAF50;
text-align:left;

}

.buttons{

display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:25px;

}

button{

flex:1;
padding:15px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;

}

.flip{

background:#FF9800;
color:white;

}

.prev{

background:#607D8B;
color:white;

}

.next{

background:#4CAF50;
color:white;

}

.lesson{

background:#2196F3;
color:white;

}

.home{

background:#9C27B0;
color:white;

}

</style>

</head>

<body>

<header>

<h1 id="lessonTitle">
Flashcard
</h1>

<p id="lessonInfo">
Sẵn sàng học
</p>

</header>

<div class="container">

<div class="progress">

<div
id="progressBar"
class="progressBar">

</div>

</div>

<div
id="flashcard"
class="card">

<div class="word" id="vn">

</div>

<div
class="cn"
id="cn">

</div>

<div
class="pinyin"
id="pinyin">

</div>

<div
class="example"
id="example">

</div>

</div>

<div class="buttons">

<button
class="flip"
onclick="flipCard()">

🔄 Lật thẻ

</button>

</div>

<div class="buttons">

<button
class="prev"
onclick="previousWord()">

⬅ Từ trước

</button>

<button
class="next"
onclick="nextWord()">

Từ tiếp ➜

</button>

</div>

<div class="buttons">

<button
class="lesson"
onclick="backLesson()">

📖 Quay lại bài học

</button>

<button
class="home"
onclick="goHome()">

🏠 Trang chủ

</button>

</div>

</div>

<script src="data.js"></script>

<script src="flashcard.js"></script>

</body>

</html>
