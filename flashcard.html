<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard</title>
<link rel="stylesheet" href="style.css">
<style>
header{background:var(--primary-gradient);}
/* 悬浮自动翻转规则 */
.flash-wrap{transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.25, 1);}
.flashcard:hover .flash-wrap{
  transform: rotateY(180deg);
}
</style>
</head>
<body>
<header class="header">
<button class="lang-switch" onclick="switchLang()">
<span id="langBtn"></span>
</button>
<h1 id="lessonTitle">Flashcard</h1>
<p id="lessonInfo"></p>
</header>
<div class="container">
<div class="progress">
<div id="progressBar" class="progressBar"></div>
</div>

<div class="flashcard" id="cardBox">
<div class="flash-wrap" id="flipWrap">
<div class="front">
<div class="word-img" id="frontImg"></div>
<div class="wordVN" id="vn"></div>
</div>
<div class="back">
<div class="word-img" id="backImg"></div>
<div class="wordVN" id="vnBack"></div>
<div class="wordCN" id="cn"></div>
<div class="wordPY" id="pinyin"></div>
<div class="example" id="example"></div>
</div>
</div>
</div>

<div class="button-group">
<button class="speak" onclick="readVoice(document.getElementById('vn').innerText)">🔊 <span id="txtListen"></span></button>
<button class="flip" onclick="flipCard()">🔄 <span id="txtFlip"></span></button>
</div>
<div class="button-group">
<button class="prev" onclick="previousWord()">⬅ <span id="txtPrev"></span></button>
<button class="next" onclick="nextWord()">➡ <span id="txtNext"></span></button>
</div>
<div class="button-group">
<button onclick="backLesson()">📖 <span id="txtBackLesson"></span></button>
<button class="primary" onclick="goHome()">🏠 <span id="txtHome"></span></button>
</div>
</div>
<script src="data.js" defer></script>
<script src="flashcard.js"></script>
</body>
</html>
