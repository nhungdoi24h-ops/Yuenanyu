<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard</title>
<link rel="stylesheet" href="style.css">
<style>
header{
background:linear-gradient(135deg,#4CAF50,#388e3c);
color:white;
padding:20px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
header h1{margin:0;font-size:30px;}
header p{margin-top:8px;opacity:0.9}
.container{max-width:900px;margin:auto;padding:20px;}
.buttons{display:flex;gap:12px;flex-wrap:wrap;margin-top:28px;}
.buttons button{flex:1;min-width:120px;}
</style>
</head>
<body>
<header>
<h1 id="lessonTitle">Flashcard Học Từ</h1>
<p id="lessonInfo">Ôn tập thẻ từ vựng</p>
</header>
<div class="container">
<div class="progress">
<div id="progressBar" class="progressBar"></div>
</div>

<div class="flashcard">
<div class="flash-wrap" id="flipWrap">
<div class="front">
<div class="wordVN" id="vn">Từ tiếng Việt</div>
</div>
<div class="back">
<div class="wordVN" id="vnBack"></div>
<div class="wordCN" id="cn"></div>
<div class="wordPY" id="pinyin"></div>
<div class="example" id="example"></div>
</div>
</div>
</div>

<div class="buttons">
<button class="speak" onclick="readVoice(document.getElementById('vn').innerText)">🔊 Nghe từ</button>
<button class="flip" onclick="flipCard()">🔄 Lật thẻ</button>
</div>
<div class="buttons">
<button class="prev" onclick="previousWord()">⬅ Từ trước</button>
<button class="next" onclick="nextWord()">Từ tiếp ➜</button>
</div>
<div class="buttons">
<button onclick="backLesson()">📖 Quay lại bài</button>
<button onclick="goHome()">🏠 Trang chủ</button>
</div>
</div>

<script src="data.js"></script>
<script src="flashcard.js"></script>
</body>
</html>
