<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bảng chữ cái</title>

<link rel="stylesheet" href="style.css">

<style>

.lesson{

    max-width:900px;

    margin:auto;

    padding:20px;

}

.lesson h1{

    text-align:center;

    margin-bottom:20px;

}

.grid{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));

    gap:15px;

}

.letter{

    background:white;

    border-radius:15px;

    padding:20px;

    text-align:center;

    cursor:pointer;

    box-shadow:0 5px 10px rgba(0,0,0,.1);

    transition:.2s;

}

.letter:hover{

    transform:scale(1.05);

}

.char{

    font-size:36px;

    font-weight:bold;

    color:#00b894;

}

.example{

    margin-top:10px;

    color:#666;

}

.bottom{

    text-align:center;

    margin-top:30px;

}

button{

    background:#00b894;

    color:white;

    border:none;

    padding:15px 30px;

    border-radius:30px;

    cursor:pointer;

    font-size:18px;

}

</style>

</head>

<body>

<header class="header">

<div class="logo">

🇻🇳 Bảng chữ cái tiếng Việt

</div>

<div class="subtitle">

Nhấn vào chữ để nghe phát âm

</div>

</header>

<div class="lesson">

<h1>29 Chữ Cái</h1>

<div class="grid" id="alphabetGrid">

</div>

<div class="bottom">

<button onclick="finishLesson()">

✅ Hoàn thành bài học

</button>

</div>

</div>

<script>

const letters=[

["A","a"],

["Ă","ă"],

["Â","â"],

["B","b"],

["C","c"],

["D","d"],

["Đ","đ"],

["E","e"],

["Ê","ê"],

["G","g"],

["H","h"],

["I","i"],

["K","k"],

["L","l"],

["M","m"],

["N","n"],

["O","o"],

["Ô","ô"],

["Ơ","ơ"],

["P","p"],

["Q","q"],

["R","r"],

["S","s"],

["T","t"],

["U","u"],

["Ư","ư"],

["V","v"],

["X","x"],

["Y","y"]

];

const grid=document.getElementById("alphabetGrid");

letters.forEach(item=>{

const div=document.createElement("div");

div.className="letter";

div.innerHTML=`

<div class="char">${item[0]}</div>

<div>${item[1]}</div>

<div class="example">🔊 Nghe</div>

`;

div.onclick=()=>{

let speak=new SpeechSynthesisUtterance(item[0]);

speak.lang="vi-VN";

speechSynthesis.speak(speak);

};

grid.appendChild(div);

});

function finishLesson(){

localStorage.setItem("lesson1","done");

alert("🎉 Chúc mừng! Bạn đã hoàn thành Bài 1.");

window.location.href="index.html";

}

</script>

</body>

</html>
