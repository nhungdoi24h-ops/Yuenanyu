<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Từ đã lưu</title>

<link rel="stylesheet" href="style.css">

<style>

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.search{
    width:100%;
    padding:15px;
    font-size:16px;
    border-radius:12px;
    border:1px solid #ddd;
    margin-bottom:20px;
}

.word{
    background:white;
    border-radius:15px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.vn{
    font-size:28px;
    color:#00b894;
    font-weight:bold;
}

.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.buttons button{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

background:#00b894;

color:white;

}

.empty{

text-align:center;

margin-top:60px;

font-size:22px;

color:#999;

}

</style>

</head>

<body>

<header class="header">

<div class="logo">

❤️ Từ đã lưu

</div>

<div class="subtitle">

Ôn tập mọi lúc

</div>

</header>

<div class="container">

<input

class="search"

id="search"

placeholder="Tìm từ..."

onkeyup="searchWord()">

<div id="list"></div>

</div>

<script>

let favorites=JSON.parse(localStorage.getItem("favorites"))||[];

function render(){

let html="";

if(favorites.length===0){

html=`
<div class="empty">

Bạn chưa lưu từ nào.

</div>
`;

}

favorites.forEach(word=>{

html+=`

<div class="word">

<div class="vn">

${word}

</div>

<div class="buttons">

<button onclick="speech('${word}')">

🔊 Nghe

</button>

<button onclick="removeWord('${word}')">

❌ Xóa

</button>

</div>

</div>

`;

});

document.getElementById("list").innerHTML=html;

}

function speech(text){

let s=new SpeechSynthesisUtterance(text);

s.lang="vi-VN";

speechSynthesis.speak(s);

}

function removeWord(word){

favorites=favorites.filter(x=>x!=word);

localStorage.setItem(

"favorites",

JSON.stringify(favorites)

);

render();

}

function searchWord(){

let keyword=document.getElementById("search").value.toLowerCase();

let cards=document.getElementsByClassName("word");

for(let i=0;i<cards.length;i++){

let text=cards[i].innerText.toLowerCase();

cards[i].style.display=text.includes(keyword)

?"block":"none";

}

}

render();

</script>

</body>

</html>
