<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cài đặt</title>

<link rel="stylesheet" href="style.css">

<style>

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    margin-bottom:20px;
    padding:20px;
    border-radius:18px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:18px 0;
}

button{
    background:#00b894;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:30px;
    cursor:pointer;
}

button:hover{
    background:#00997a;
}

select{
    padding:8px;
    border-radius:8px;
}

.switch{

position:relative;

display:inline-block;

width:55px;

height:28px;

}

.switch input{

display:none;

}

.slider{

position:absolute;

cursor:pointer;

top:0;

left:0;

right:0;

bottom:0;

background:#ccc;

transition:.3s;

border-radius:30px;

}

.slider:before{

content:"";

position:absolute;

width:22px;

height:22px;

left:3px;

bottom:3px;

background:white;

transition:.3s;

border-radius:50%;

}

input:checked + .slider{

background:#00b894;

}

input:checked + .slider:before{

transform:translateX(27px);

}

</style>

</head>

<body>

<header class="header">

<div class="logo">

⚙️ Cài đặt

</div>

<div class="subtitle">

VietMiniApp

</div>

</header>

<div class="container">

<div class="card">

<h2>Giao diện</h2>

<div class="item">

<span>🌙 Chế độ tối</span>

<label class="switch">

<input
type="checkbox"
id="darkSwitch">

<span class="slider"></span>

</label>

</div>

</div>

<div class="card">

<h2>Ngôn ngữ</h2>

<div class="item">

<select id="language">

<option>Tiếng Việt</option>

<option>中文</option>

<option>English</option>

</select>

</div>

</div>

<div class="card">

<h2>Âm thanh</h2>

<div class="item">

<span>Bật phát âm</span>

<label class="switch">

<input
type="checkbox"
checked>

<span class="slider"></span>

</label>

</div>

</div>

<div class="card">

<h2>Dữ liệu</h2>

<button onclick="resetData()">

🗑 Xóa toàn bộ dữ liệu

</button>

</div>

<div class="card">

<h2>Thông tin</h2>

<p>VietMiniApp</p>

<p>Phiên bản 1.0</p>

<p>Học tiếng Việt cho người Trung Quốc</p>

</div>

<button onclick="location.href='index.html'">

🏠 Trang chủ

</button>

</div>

<script>

const sw=document.getElementById("darkSwitch");

if(localStorage.getItem("theme")=="true"){

sw.checked=true;

document.body.classList.add("dark");

}

sw.onchange=function(){

if(sw.checked){

document.body.classList.add("dark");

localStorage.setItem("theme","true");

}else{

document.body.classList.remove("dark");

localStorage.setItem("theme","false");

}

}

function resetData(){

if(confirm("Bạn có chắc muốn xóa toàn bộ dữ liệu học?")){

localStorage.clear();

alert("Đã xóa dữ liệu.");

location.reload();

}

}

</script>

</body>

</html>
